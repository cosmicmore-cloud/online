<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알고모바일 요금제 생성기</title>
<style>
    :root {
        --sk-red: #e60023;
        --kt-blue: #007aff;
        --lg-purple: #8e44ad;
        --main-color: --sk-red; 
    }

    body { background: #f0f2f5; padding: 20px; display: flex; flex-direction: row; gap: 20px; font-family: 'Pretendard', -apple-system, sans-serif; }

    /* [1] 왼쪽 설정 컨트롤러 */
    .admin-controls {
        width: 240px; background: #fff; padding: 20px; border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #ddd;
        position: sticky; top: 20px; height: fit-content;
    }
    .admin-controls h2 { font-size: 16px; margin-bottom: 15px; color: #333; border-bottom: 2px solid #333; padding-bottom: 5px; }
    .admin-controls label { font-size: 11px; font-weight: bold; color: #666; display: block; margin-top: 10px; }
    .admin-controls select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; cursor: pointer; }
    
    .model-selector { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; max-height: 500px; overflow-y: auto; padding-right: 5px; }
    .model-btn { padding: 10px; border: 1px solid #eee; background: #f9f9f9; border-radius: 6px; text-align: left; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
    .model-btn:hover { background: #f0f0f0; }
    .model-btn.active { background: #000; color: #fff; border-color: #000; }

    /* [2] 오른쪽 캡처 영역 */
    .capture-area { 
        width: 500px; background: #fff; border-radius: 24px; overflow: hidden; 
        box-shadow: 0 20px 50px rgba(0,0,0,0.2); border: 1px solid #eee;
        position: relative;
    }

    .header { background: #111; color: #fff; padding: 30px 20px; text-align: center; }
    .header .brand { color: var(--main-color); font-size: 14px; font-weight: 900; letter-spacing: 3px; display: block; margin-bottom: 8px; }
    .header .guide-text { color: #aaa; font-size: 12px; margin-bottom: 12px; font-weight: 500; }
    .header .title { font-size: 32px; font-weight: 900; letter-spacing: -1px; }

    .condition-bar {
        display: flex; justify-content: space-around; background: #f8f9fa; padding: 15px;
        border-bottom: 1px solid #eee; font-size: 14px; font-weight: 800; color: #444;
    }
    .condition-bar span { color: var(--main-color); }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { background: #fdfdfd; padding: 15px 5px; font-size: 12px; border-bottom: 2px solid #333; color: #333; }
    td { padding: 22px 5px; text-align: center; border-bottom: 1px solid #eee; font-size: 15px; }
    
    .plan-name { font-weight: 800; color: #222; font-size: 15px; }
    .price-sub { font-size: 11px; color: #999; margin-top: 4px; font-weight: normal; }
    
    .price-red { color: var(--main-color) !important; font-weight: 900; font-size: 25px !important; letter-spacing: -1px; }
    .won { font-size: 15px; margin-left: 1px; }

    /* 부가서비스 섹션 */
    .addon-section { background: #fff; padding: 15px 20px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
    .addon-title { font-size: 12px; font-weight: 800; color: var(--main-color); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .addon-content { background: #fdf2f2; border: 1px dashed var(--main-color); border-radius: 10px; padding: 12px; font-size: 13px; font-weight: 700; color: #333; line-height: 1.5; }
    .addon-content.kt { background: #f2f7ff; border-color: var(--kt-blue); }
    .addon-content.lg { background: #f9f2fb; border-color: var(--lg-purple); }

    .contact-info {
        background: #f8f9fa; padding: 20px;
        display: flex; justify-content: space-between; align-items: center;
    }
    .contact-text { font-size: 14px; font-weight: 800; color: #333; }
    .contact-text span { color: var(--main-color); display: block; font-size: 18px; margin-top: 2px; }
    .kakao-btn-box {
        background: #fee500; color: #3c1e1e; padding: 10px 15px; border-radius: 10px;
        text-decoration: none; font-size: 13px; font-weight: 900; display: flex; align-items: center; gap: 5px;
    }

    .footer-notice { padding: 20px; background: #fafafa; font-size: 12px; color: #888; line-height: 1.7; border-top: 1px solid #eee; }

    .kakao-fixed {
        position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
        background: #fee500; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 9999; text-decoration: none;
    }
    .kakao-fixed img { width: 30px; height: 30px; }
</style>
</head>
<body>

<div class="admin-controls">
    <h2>알고모바일 설정</h2>
    
    <label>1. 통신사 선택</label>
    <select id="telecom-select" onchange="updateBrand(this.value)">
        <option value="SK">SKT (RED)</option>
        <option value="KT">KT (BLUE)</option>
        <option value="LG">LGU+ (PURPLE)</option>
    </select>

    <label>2. 할인 방식</label>
    <select onchange="updateMode(this.value)">
        <option value="gongsi">공시지원금 할인</option>
        <option value="sanyak">선택약정 25% 할인</option>
    </select>

    <label>3. 가입 유형 / 결제</label>
    <select onchange="updateType(this.value)">
        <option value="UP">기기변경</option>
        <option value="NP">번호이동</option>
    </select>
    <select style="margin-top:5px;" onchange="updatePay(this.value)">
        <option value="install">24개월 할부</option>
        <option value="cash">현금 일시납(완납)</option>
    </select>

    <label>4. 모델 선택 (실시간 시트)</label>
    <div class="model-selector" id="model-list">
        <div style="font-size:12px; color:#999; padding:10px;">데이터 로딩 중...</div>
    </div>
</div>

<div class="capture-area" id="capture-target">
    <div class="header">
        <span class="brand">ALGO MOBILE</span>
        <div class="guide-text">모델 및 가입유형을 고르시면 월 납부액이 자동계산됩니다.</div>
        <div class="title" id="display-model-name">연동 중...</div>
    </div>

    <div class="condition-bar">
        <div><span id="view-tel">SKT</span></div>
        <div><span id="view-type">기기변경</span></div>
        <div><span id="view-mode">공시지원금</span></div>
        <div><span id="view-pay">24개월 할부</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th width="32%">요금제</th>
                <th width="20%">할인항목</th>
                <th width="20%">할부원금</th>
                <th width="28%">월 납부액</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="addon-section">
        <div class="addon-title">📌 개통 필수 부가서비스 안내</div>
        <div id="addon-box" class="addon-content">
            </div>
    </div>

    <div class="contact-info">
        <div class="contact-text">
            실시간 재고 및 개통 문의
            <span>📞 010-7577-5800</span>
        </div>
        <a href="http://pf.kakao.com/_sdYlu/chat" target="_blank" class="kakao-btn-box">
            카톡 상담하기
        </a>
    </div>

    <div class="footer-notice">
        • <b>알고모바일</b>은 부가세 및 할부이자(5.9%)가 포함된 실제 청구 금액을 안내합니다.<br>
        • <b>선택약정</b>은 매월 통신 요금의 25%가 즉시 할인되는 방식입니다.<br>
        • 지원금 및 정책은 통신사 사정에 따라 실시간으로 변동될 수 있습니다.
    </div>
</div>

<a href="http://pf.kakao.com/_sdYlu/chat" target="_blank" class="kakao-fixed">
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/KakaoTalk_logo.svg" alt="카톡상담">
</a>

<script>
const FILE_IDS = {
    SK: "13vra0xzllGhkkuVoNaA_KOHXiHbRfwol8zDiB24S00o", 
    KT: "1x3tNRBfNPV4E4OdkM4pDYlD4HKJP1dN0Z2QZxdcXE4o", 
    LG: "1NaQvnsgXLBWKl9n15otRXCMfRElLhyLdk54VmEGLkfU" 
};

const TAB_NAMES = {
    SK: "skprice",
    KT: "skprice",
    LG: "skprice"
};

// 통신사별 부가서비스 DB
const ADDON_DB = {
    SK: "보험 T All케어6 M+1개월 (미가입 시 단가 +2만 원)",
    KT: "필수팩 L1(9,900원) X 4개월 유지 (미가입 시 단가 +5만 원)",
    LG: "벨링모아A (93일 유지), 폰안심패스(93일 유지 / 슬림 제외) (미가입 시 단가 +6만 원)"
};

const PLAN_DB = {
    SK: [
        {n:"5GX 프리미엄", p:109000}, {n:"5GX 프라임플러스", p:99000}, 
        {n:"5GX 프라임", p:89000}, {n:"5G 레귤러플러스", p:79000}
    ],
    KT: [
        {n:"초이스 스페셜", p:110000}, {n:"스페셜", p:100000}, 
        {n:"초이스 베이직", p:90000}, {n:"5G 심플110G", p:69000}
    ],
    LG: [
        {n:"5G 시그니처", p:130000}, {n:"5G 프리미어 슈퍼", p:115000}, 
        {n:"5G 프리미어 플러스", p:105000}, {n:"5G 프리미어레귤러", p:95000}
    ]
};

let DEVICES = [], curDev = null;
let state = { tel: 'SK', pay: 'install', type: 'UP', mode: 'gongsi' };

async function loadData() {
    const listArea = document.getElementById('model-list');
    listArea.innerHTML = `<div style="font-size:12px; color:#999; padding:10px;">${state.tel} 데이터 갱신 중...</div>`;
    
    const fileId = FILE_IDS[state.tel];
    const tabName = TAB_NAMES[state.tel];
    const url = `https://docs.google.com/spreadsheets/d/${fileId}/gviz/tq?tqx=out:csv&sheet=${tabName}`;

    try {
        const res = await fetch(url);
        const text = await res.text();
        const rows = text.split('\n').filter(r => r.trim() !== "").map(row => {
            const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
            return row.split(regex).map(cell => cell.replace(/"/g, '').trim());
        });

        DEVICES = rows.slice(1).map(cols => {
            const n = (v) => parseInt(String(v || "0").replace(/[^0-9]/g, "")) || 0;
            const s = (str) => {
                let arr = (str || "0,0,0,0").split(',').map(v => n(v) * 10000);
                while(arr.length < 4) arr.push(0);
                return arr;
            };
            return { name: cols[0], price: n(cols[1]), extra: n(cols[2]), UP: s(cols[3]), NP: s(cols[4]) };
        }).filter(d => d.name && d.name !== "");

        listArea.innerHTML = "";
        DEVICES.forEach((d, i) => {
            const btn = document.createElement('div');
            btn.className = `model-btn ${i===0?'active':''}`;
            btn.innerText = d.name;
            btn.onclick = function() {
                document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                curDev = d;
                render();
            };
            listArea.appendChild(btn);
        });

        curDev = DEVICES[0];
        render();
    } catch (e) {
        listArea.innerHTML = `<div style="color:red; font-size:11px; padding:10px;">[${state.tel}] 연동 실패!<br>파일 > 공유 > 웹에 게시 필수</div>`;
    }
}

function render() {
    if(!curDev) return;
    const body = document.getElementById('tableBody');
    const plans = PLAN_DB[state.tel];
    
    document.getElementById('display-model-name').innerText = curDev.name;
    document.getElementById('view-tel').innerText = state.tel + (state.tel === 'LG' ? 'U+' : 'T');
    document.getElementById('view-type').innerText = state.type === 'UP' ? '기기변경' : '번호이동';
    document.getElementById('view-mode').innerText = state.mode === 'gongsi' ? '공시지원금' : '선택약정(25%)';
    document.getElementById('view-pay').innerText = state.pay === 'install' ? '24개월 할부' : '일시납(완납)';
    
    // 부가서비스 문구 및 스타일 업데이트
    const addonBox = document.getElementById('addon-box');
    addonBox.innerText = ADDON_DB[state.tel];
    addonBox.className = "addon-content " + state.tel.toLowerCase();

    body.innerHTML = "";
    plans.forEach((p, i) => {
        let saleText = "";
        let princ = 0;
        let monthlyPlan = 0;

        if (state.mode === 'gongsi') {
            let gongsi = (curDev[state.type][i] || 0) + curDev.extra;
            saleText = (gongsi/10000).toFixed(0) + "만 할인";
            princ = Math.max(0, curDev.price - gongsi);
            monthlyPlan = p.p;
        } else {
            saleText = "요금 25% 할인";
            princ = curDev.price;
            monthlyPlan = p.p * 0.75;
        }

        let monthlyDevice = state.pay === 'install' ? Math.floor((princ * 1.059) / 24 / 10) * 10 : 0;
        let total = monthlyDevice + monthlyPlan;

        body.innerHTML += `
            <tr>
                <td class="plan-name">${p.n}<div class="price-sub">${p.p.toLocaleString()}원 요금제</div></td>
                <td style="color:${state.mode==='gongsi'?'#444':'#27ae60'}; font-weight:700; font-size:13px;">${saleText}</td>
                <td style="color:#666; font-size:13px;">${princ.toLocaleString()}원</td>
                <td class="price-red">${total.toLocaleString()}<span class="won">원</span></td>
            </tr>
        `;
    });
}

function updateBrand(val) {
    state.tel = val;
    const root = document.querySelector(':root');
    if(val === 'SK') root.style.setProperty('--main-color', '#e60023');
    if(val === 'KT') root.style.setProperty('--main-color', '#007aff');
    if(val === 'LG') root.style.setProperty('--main-color', '#8e44ad');
    loadData(); 
}

function updateMode(val) { state.mode = val; render(); }
function updatePay(val) { state.pay = val; render(); }
function updateType(val) { state.type = val; render(); }

loadData(); 
</script>
</body>
</html>
