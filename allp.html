<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알고 모바일 | 실시간 요금표</title>
    <style>
        :root { 
            --t-red: #e60023; 
            --t-black: #111111;
            --t-blue: #0054ff; 
            --t-grey-line: #dddddd;
            --main-color: #e60023;
            --kakao-color: #FEE500;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
        body { background-color: #fff; padding: 0; color: var(--t-black); }
        
        .calc-wrapper { width: 100%; max-width: 100%; margin: 0 auto; background: #fff; border: 1px solid var(--t-grey-line); overflow: hidden; }
        
        .agency-nav { display: flex; background: #fff; border-bottom: 2px solid var(--t-grey-line); }
        .agency-tab { flex: 1; padding: 18px; border: none; background: #fff; color: #999; cursor: pointer; font-weight: 800; font-size: 1.1rem; }
        .agency-tab.active { color: var(--main-color); border-bottom: 4px solid var(--main-color); }

        .product-header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--t-grey-line); background: #fafafa; }
        .model-name { font-size: 2.2rem; font-weight: 900; color: #333; margin-bottom: 10px; letter-spacing: -1px; }
        .spec-info { font-size: 1rem; color: #666; margin-bottom: 20px; }
        .price-tag-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .price-tag { background: #fff; border: 2px solid #333; border-radius: 50px; padding: 10px 20px; font-size: 1rem; font-weight: 700; }

        .control-panel { padding: 25px; background: #fff; border-bottom: 1px solid var(--t-grey-line); }
        #model-selector { width: 100%; padding: 15px; border: 2px solid #333; border-radius: 8px; font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; cursor: pointer; }
        .option-row { display: flex; background: #eee; padding: 5px; border-radius: 10px; margin-bottom: 10px; }
        .opt-btn { flex: 1; padding: 14px; border: none; background: transparent; color: #777; cursor: pointer; font-weight: 700; border-radius: 7px; font-size: 0.9rem; }
        .opt-btn.active { background: #fff; color: #000; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }

        .notice-box { background: #222; color: #fff; margin: 20px; padding: 20px; border-radius: 10px; font-size: 0.9rem; line-height: 1.6; }
        .notice-box b { color: #ffeb3b; display: block; margin-bottom: 8px; font-size: 1.05rem; }

        .price-table-container { padding: 0 20px 30px; }
        .price-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; text-align: center; table-layout: fixed; }
        .price-table th { background: #5a668c; color: #fff; padding: 15px 5px; font-weight: 700; border: 1px solid #ddd; }
        .price-table td { padding: 20px 10px; border: 1px solid #ddd; background: #fff; word-break: keep-all; }
        
        .plan-title { font-weight: 800; color: #333; font-size: 1.05rem; margin-bottom: 3px; }
        
        .discount-info { color: #e60023; font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
        .principal-price { color: var(--t-blue); font-weight: 900; font-size: 1.6rem; letter-spacing: -1px; }
        .total-monthly { font-weight: 900; font-size: 1.4rem; color: #000; }
        
        .sub-txt { font-size: 0.8rem; color: #999; margin-top: 4px; }
        .cash-badge { display: inline-block; padding: 2px 6px; background: #000; color: #fff; border-radius: 4px; font-size: 0.75rem; margin-bottom: 5px; }

        .bottom-btns { padding: 20px 25px 40px; display: flex; flex-direction: column; gap: 12px; max-width: 600px; margin: 0 auto; }
        .btn { text-decoration: none; height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 800; font-size: 1.2rem; }
        .btn-main { background: #000; color: #fff; }
        .btn-kakao { background: var(--kakao-color); color: #3c1e1e; }

        @media (max-width: 600px) {
            .model-name { font-size: 1.6rem; }
            .price-table { font-size: 0.8rem; }
            .principal-price { font-size: 1.25rem; }
            .total-monthly { font-size: 1.1rem; }
            .opt-btn { font-size: 0.75rem; padding: 10px 4px; }
        }
    </style>
</head>
<body>

<div class="calc-wrapper">
    <div class="agency-nav" id="agency-tabs">
        <button class="agency-tab active" onclick="changeAgency('SK', this)">SKT</button>
        <button class="agency-tab" onclick="changeAgency('KT', this)">KT</button>
        <button class="agency-tab" onclick="changeAgency('LG', this)">LG U+</button>
    </div>

    <div class="product-header">
        <div class="model-name" id="display-model">모델 선택</div>
        <p class="spec-info">실시간 할인 적용 특가표</p>
        <div class="price-tag-group">
            <div class="price-tag" id="tag-price">출고가 확인 중...</div>
        </div>
    </div>

    <div class="control-panel">
        <select id="model-selector" onchange="render()"></select>
        <div class="option-row">
            <button class="opt-btn active" onclick="setOpt('transfer', 'MNP', this)">번호이동</button>
            <button class="opt-btn" onclick="setOpt('transfer', 'KSP', this)">기기변경</button>
        </div>
        <div class="option-row">
            <button class="opt-btn active" onclick="setOpt('discount', '공시', this)">공시지원할인</button>
            <button class="opt-btn" onclick="setOpt('discount', '선약', this)">선택약정(25%할인)</button>
        </div>
        <div class="option-row">
            <button class="opt-btn active" onclick="setOpt('payType', '할부', this)">24개월 할부</button>
            <button class="opt-btn" onclick="setOpt('payType', '완납', this)">현금 완납</button>
        </div>
    </div>

    <div class="notice-box">
        <b>[ 가입 안내 ]</b>
        - 파란색 <b>할부원금</b>은 모든 할인(공시/선약 + 추가지원금)이 적용된 가격입니다.<br>
        - 요금제별로 <b>추가지원금</b>이 상이할 수 있으니 표를 확인해주세요.
    </div>

    <div class="price-table-container">
        <table class="price-table">
            <thead>
                <tr>
                    <th style="width: 25%;">요금제</th>
                    <th style="width: 20%;">데이터</th>
                    <th style="width: 30%;">추가지원금/원금</th>
                    <th style="width: 25%;">월 청구액</th>
                </tr>
            </thead>
            <tbody id="price-body"></tbody>
        </table>
    </div>

    <div class="bottom-btns">
        <a id="apply-link" href="#" target="_blank" class="btn btn-main">공식 신청서 접수하기</a>
        <a href="http://pf.kakao.com/_xmgiwn/chat" target="_blank" class="btn btn-kakao">카카오톡 실시간 상담하기</a>
    </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkpuK9stqU__s1xNNaLWgQ3VZjjgIziQtmCav6v2bZirYZQrOJn9kZoxuEK34hb7BU5Qj-1igcI2Jc/pub?output=csv";
    const PLAN_LIST = {
        SK: [{n:"5GX 프리미엄", d:"무제한", f:109000}, {n:"5GX 프라임+", d:"무제한", f:99000}, {n:"5GX 프라임", d:"무제한", f:89000}, {n:"5G 레귤러+", d:"250GB", f:79000}],
        KT: [{n:"초이스 프리미엄", d:"무제한", f:130000}, {n:"초이스 스페셜", d:"무제한", f:110000}, {n:"초이스 베이직", d:"무제한", f:90000}, {n:"5G 심플110G", d:"110GB", f:69000}],
        LG: [{n:"5G 시그니처", d:"무제한", f:130000}, {n:"5G 프리미어S", d:"무제한", f:115000}, {n:"5G 프리미어P", d:"무제한", f:105000}, {n:"5G 프리미어R", d:"무제한", f:95000}]
    };

    let allData = [];
    let state = { agency: "SK", transfer: "MNP", discount: "공시", payType: "할부" };

    async function init() {
        try {
            const res = await fetch(`${CSV_URL}&t=${Date.now()}`);
            const text = await res.text();
            const rows = text.split('\n').filter(r => r.trim()).map(row => {
                const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                return row.split(regex).map(cell => cell.replace(/"/g, '').trim());
            });
            const headers = rows[0].map(h => h.trim());
            allData = rows.slice(1).map(row => {
                let obj = {};
                headers.forEach((h, i) => obj[h] = row[i]);
                return obj;
            });
            document.getElementById('model-selector').innerHTML = allData.map((d, i) => `<option value="${i}">${d.기종명}</option>`).join('');
            render();
        } catch(e) { console.error("데이터 로드 실패"); }
    }

    function clean(n) {
        if(!n) return 0;
        let num = Number(String(n).replace(/[^0-9]/g, ''));
        // 만원 단위 입력 대응 (예: 50 입력 시 500,000으로 처리)
        return (num > 0 && num < 5000) ? num * 10000 : num;
    }

    function render() {
        const item = allData[document.getElementById('model-selector').value];
        if(!item) return;

        document.getElementById('display-model').innerText = item.기종명;
        const fPrice = clean(item.출고가);
        document.getElementById('tag-price').innerText = `출고가: ${fPrice.toLocaleString()}원`;
        document.getElementById('apply-link').href = item.신청서URL || "#";

        let html = '';
        PLAN_LIST[state.agency].forEach((plan, i) => {
            // [핵심 수정] 추가지원금 데이터를 가져와서 콤마로 나눔
            const extraCol = state.transfer === 'MNP' ? item.번이_추가지원금 : item.기변_추가지원금;
            const extraArray = (extraCol || "").split(',');
            // i번째 값이 있으면 사용하고, 없으면 0번째 값 사용 (데이터가 하나만 있을 때 대비)
            const rawExtra = extraArray[i] !== undefined ? extraArray[i] : extraArray[0];
            const extra = clean(rawExtra);

            // 공시지원금 데이터 처리
            const gongsiCol = `${state.agency}T${state.transfer === 'MNP' ? '번이' : '기변'}`;
            const gongsiArray = (item[gongsiCol] || "").split(',');
            const gongsi = clean(gongsiArray[i] !== undefined ? gongsiArray[i] : gongsiArray[0]);

            let totalSale = (state.discount === '공시') ? (gongsi + extra) : extra;
            let fee = (state.discount === '공시') ? plan.f : plan.f * 0.75;
            let principal = Math.max(0, fPrice - totalSale);
            
            let deviceMonthly = (state.payType === '할부') ? Math.floor((principal * 1.059) / 24 / 10) * 10 : 0;
            let totalCharge = deviceMonthly + fee;

            html += `
                <tr>
                    <td><div class="plan-title">${plan.n}</div><div class="sub-txt">${plan.f.toLocaleString()}원</div></td>
                    <td>${plan.d}</td>
                    <td>
                        <div class="discount-info">추가지원: ${(extra/10000).toFixed(0)}만</div>
                        <div class="principal-price">${Math.floor(principal/10000)}만</div>
                        <div class="sub-txt">최종 할부원금</div>
                    </td>
                    <td>
                        ${state.payType === '완납' ? '<span class="cash-badge">현금완납</span>' : ''}
                        <div class="total-monthly">${totalCharge.toLocaleString()}원</div>
                        <div class="sub-txt">월 청구합계</div>
                    </td>
                </tr>`;
        });
        document.getElementById('price-body').innerHTML = html;
    }

    function changeAgency(a, btn) {
        state.agency = a;
        document.querySelectorAll('.agency-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        const colors = { SK: '#e60023', KT: '#000', LG: '#e6007e' };
        document.documentElement.style.setProperty('--main-color', colors[a]);
        render();
    }

    function setOpt(k, v, btn) {
        state[k] = v;
        btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    init();
</script>
</body>
</html>
