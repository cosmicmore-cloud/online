<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알고모바일 | 온라인 통합 시세표</title>
    <style>
        :root {
            --primary: #3182F6; --text: #191F28; --sub: #6B7684;
            --bg: #F5F6F8; --card: #FFFFFF; --border: #E5E8EB;
            --radius: 20px; --shadow: 0 8px 24px rgba(0,0,0,.06);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 16px; }

        .topbar { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 15px 0; }
        .brand { font-weight: 900; font-size: 22px; text-align: center; color: var(--primary); }

        .filter-card { background: var(--card); border-radius: var(--radius); padding: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); margin: 20px 0; }
        .filter-group { margin-bottom: 20px; }
        .filter-label { font-size: 13px; font-weight: 700; color: var(--sub); margin-bottom: 10px; display: block; }
        
        .chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { border: 1px solid var(--border); background: #fff; padding: 10px 18px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 14px; color: #4E5968; transition: 0.2s; }
        .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        .search-input { width: 100%; border: 2px solid var(--border); border-radius: 14px; padding: 15px; font-size: 16px; outline: none; font-weight: 700; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .p-card { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; transition: 0.3s; height: 100%; }
        .p-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        
        .badge-row { display: flex; gap: 6px; margin-bottom: 12px; }
        .badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: 800; background: #F2F4F6; color: #4E5968; }
        .badge.carrier { background: #E8F3FF; color: var(--primary); }

        .model-name { font-size: 20px; font-weight: 900; margin-bottom: 12px; color: #191F28; }
        .info-box { background: #F9FAFB; border-radius: 12px; padding: 14px; font-size: 13px; color: var(--sub); margin-bottom: 20px; border: 1px solid #f0f0f0; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .info-row b { color: #333; }

        .price-label { font-size: 12px; color: var(--sub); font-weight: bold; margin-bottom: 2px; }
        .price-value { font-size: 36px; font-weight: 1000; color: #191F28; letter-spacing: -1px; }
        .price-value span { font-size: 18px; font-weight: 800; margin-left: 1px; }

        .btn-apply { display: block; width: 100%; background: var(--primary); color: #fff; text-align: center; padding: 16px; border-radius: 14px; font-weight: 800; text-decoration: none; margin-top: 20px; font-size: 16px; }
        #loading { text-align: center; padding: 100px 0; font-weight: bold; color: var(--sub); }
    </style>
</head>
<body>

<div class="topbar">
    <div class="container"><div class="brand">ALGO ONLINE 🚀</div></div>
</div>

<div class="container">
    <div class="filter-card">
        <div class="filter-group">
            <span class="filter-label">1. 통신사 선택</span>
            <div class="chips" id="carrierFilter">
                <button class="chip active" data-val="SKT">SKT</button>
                <button class="chip" data-val="KT">KT</button>
                <button class="chip" data-val="LGU+">LGU+</button>
            </div>
        </div>
        <div class="filter-group">
            <span class="filter-label">2. 가입유형 선택</span>
            <div class="chips" id="typeFilter">
                <button class="chip active" data-val="KOT">기기변경</button>
                <button class="chip" data-val="MNP">번호이동</button>
            </div>
        </div>
        <input type="text" id="modelSearch" class="search-input" placeholder="모델명 검색 (예: S26, 아이폰)">
    </div>

    <div id="loading">데이터를 불러오고 있습니다...</div>
    <div id="priceGrid" class="grid"></div>
</div>

<script>
    // 공유해주신 시트 ID 적용
    const SHEET_ID = '1gj6rdMXBkvkgo0wx6o9XCm_7MjdRJOhjlkzgAWAmiCY';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&t=${new Date().getTime()}`;

    let allData = [];
    let state = { carrier: 'SKT', type: 'KOT', search: '' };

    async function fetchData() {
        const loading = document.getElementById('loading');
        try {
            const res = await fetch(CSV_URL);
            if (!res.ok) throw new Error("시트 연결 실패 (웹에 게시 여부 확인)");
            
            const text = await res.text();
            const rows = text.split('\n').map(row => {
                const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                return row.split(regex).map(cell => cell.replace(/"/g, '').trim());
            });

            // 1. "모델명" 글자가 있는 진짜 제목줄 찾기
            const headerIndex = rows.findIndex(r => r.some(cell => cell.includes("모델명")));
            if (headerIndex === -1) throw new Error("시트에서 '모델명' 제목줄을 찾을 수 없습니다.");
            
            const header = rows[headerIndex];
            
            // 2. 제목 기반으로 데이터 위치 자동 매핑 (데이터 밀림 방지)
            const idx = {
                model: header.findIndex(h => h.includes("모델명")),
                mnp: header.findIndex(h => h.includes("번호이동가")),
                kot: header.findIndex(h => h.includes("기기변경가")),
                carrier: header.findIndex(h => h.includes("통신사")),
                storage: header.findIndex(h => h.includes("용량")),
                plan: header.findIndex(h => h.includes("요금제")),
                url: header.findIndex(h => h.includes("신청서링크"))
            };

            // 3. 데이터 저장
            allData = rows.slice(headerIndex + 1)
                .filter(cols => cols[idx.model] && cols[idx.model] !== "")
                .map(cols => ({
                    model: cols[idx.model],
                    priceMNP: cols[idx.mnp],
                    priceKOT: cols[idx.kot],
                    carrier: cols[idx.carrier],
                    storage: cols[idx.storage],
                    plan: cols[idx.plan],
                    url: cols[idx.url]
                }));

            loading.style.display = 'none';
            render();
        } catch (e) {
            loading.innerText = "❌ 로딩 실패: " + e.message;
        }
    }

    function render() {
        const grid = document.getElementById('priceGrid');
        const filtered = allData.filter(item => {
            // 통신사 필터링 (SKT, KT, LGU+)
            const carrierMatch = item.carrier === state.carrier;
            const searchMatch = item.model.toLowerCase().includes(state.search.toLowerCase());
            return carrierMatch && searchMatch;
        });

        if(filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px;">해당 조건의 모델이 없습니다.</div>';
            return;
        }

        grid.innerHTML = filtered.map(item => {
            const price = state.type === 'KOT' ? item.priceKOT : item.priceMNP;
            const typeLabel = state.type === 'KOT' ? '기기변경' : '번호이동';
            
            return `
                <div class="p-card">
                    <div class="badge-row">
                        <span class="badge carrier">${item.carrier}</span>
                        <span class="badge">${item.storage}</span>
                    </div>
                    <div class="model-name">${item.model}</div>
                    <div class="info-box">
                        <div class="info-row"><span>가입유형</span><b>${typeLabel}</b></div>
                        <div class="info-row"><span>요금제</span><b>${item.plan}</b></div>
                    </div>
                    <div style="margin-top:auto">
                        <div class="price-label">실구매가 (현금완납)</div>
                        <div class="price-value">${price || '문의'}<span>만원</span></div>
                        <a href="${item.url}" target="_blank" class="btn-apply">재고 확인 및 상담</a>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 필터 클릭 이벤트
    document.getElementById('carrierFilter').onclick = e => {
        if (!e.target.classList.contains('chip')) return;
        document.querySelectorAll('#carrierFilter .chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        state.carrier = e.target.dataset.val;
        render();
    };

    document.getElementById('typeFilter').onclick = e => {
        if (!e.target.classList.contains('chip')) return;
        document.querySelectorAll('#typeFilter .chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        state.type = e.target.dataset.val;
        render();
    };

    document.getElementById('modelSearch').oninput = e => {
        state.search = e.target.value;
        render();
    };

    fetchData();
</script>
</body>
</html>
